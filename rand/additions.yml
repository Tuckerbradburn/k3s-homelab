---
- name: Harden system - Disable CtrlAltDelBurstAction and enforce without-nullok
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Set CtrlAltDelBurstAction to none in system.conf
      ansible.builtin.lineinfile:
        path: /etc/systemd/system.conf
        # Match the line whether it is commented out or already set
        regexp: '^#?\s*CtrlAltDelBurstAction='
        line: 'CtrlAltDelBurstAction=none'
        state: present
        backup: yes

    - name: Enable without-nullok feature via authselect
      ansible.builtin.command:
        cmd: authselect enable-feature without-nullok
      register: authselect_result
      changed_when: "'Feature already enabled' not in authselect_result.stdout"

    - name: Append pti=on to GRUB_CMDLINE_LINUX in /etc/default/grub (if not already present)
      ansible.builtin.replace:
        path: /etc/default/grub
        # Match the closing quote of GRUB_CMDLINE_LINUX only when pti=on is absent
        regexp: '^(GRUB_CMDLINE_LINUX="(?!.*pti=on).*)"\s*$'
        replace: '\1 pti=on"'
        backup: yes

    - name: Apply pti=on to all kernels via grubby
      ansible.builtin.command:
        cmd: grubby --update-kernel=ALL --args="pti=on"
      register: grubby_result
      changed_when: grubby_result.rc == 0

    - name: Append audit=1 to GRUB_CMDLINE_LINUX in /etc/default/grub (if not already present)
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^(GRUB_CMDLINE_LINUX="(?!.*audit=1).*)"\s*$'
        replace: '\1 audit=1"'
        backup: yes

    - name: Apply audit=1 to all kernels via grubby
      ansible.builtin.command:
        cmd: grubby --update-kernel=ALL --args="audit=1"
      register: grubby_audit_result
      changed_when: grubby_audit_result.rc == 0

    - name: Append audit_backlog_limit=8192 to GRUB_CMDLINE_LINUX in /etc/default/grub (if not already present)
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^(GRUB_CMDLINE_LINUX="(?!.*audit_backlog_limit).*)"\s*$'
        replace: '\1 audit_backlog_limit=8192"'
        backup: yes

    - name: Apply audit_backlog_limit=8192 to all kernels via grubby
      ansible.builtin.command:
        cmd: grubby --update-kernel=ALL --args="audit_backlog_limit=8192"
      register: grubby_backlog_result
      changed_when: grubby_backlog_result.rc == 0

    - name: Append vsyscall=none to GRUB_CMDLINE_LINUX in /etc/default/grub (if not already present)
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^(GRUB_CMDLINE_LINUX="(?!.*vsyscall=none).*)"\s*$'
        replace: '\1 vsyscall=none"'
        backup: yes

    - name: Apply vsyscall=none to all kernels via grubby
      ansible.builtin.command:
        cmd: grubby --update-kernel=ALL --args="vsyscall=none"
      register: grubby_vsyscall_result
      changed_when: grubby_vsyscall_result.rc == 0

    - name: Append page_poison=1 to GRUB_CMDLINE_LINUX in /etc/default/grub (if not already present)
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^(GRUB_CMDLINE_LINUX="(?!.*page_poison=1).*)"\s*$'
        replace: '\1 page_poison=1"'
        backup: yes

    - name: Apply page_poison=1 to all kernels via grubby
      ansible.builtin.command:
        cmd: grubby --update-kernel=ALL --args="page_poison=1"
      register: grubby_page_poison_result
      changed_when: grubby_page_poison_result.rc == 0

    - name: Set permissions 0740 on all local user home directories
      ansible.builtin.shell: |
        getent passwd | awk -F: '$3 >= 1000 && $6 ~ /^\/home\// {print $6}' | while read dir; do
          [ -d "$dir" ] && chmod 0740 "$dir"
        done
      changed_when: false

    - name: Restrict postfix client connections to local network
      ansible.builtin.command:
        cmd: postconf -e 'smtpd_client_restrictions = permit_mynetworks,reject'
      register: postconf_result
      changed_when: postconf_result.rc == 0
      notify: Restart postfix

    - name: Disable IPv4 packet forwarding via sysctl config file
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/ipv4_forwarding.conf
        line: 'net.ipv4.conf.all.forwarding = 0'
        regexp: '^net\.ipv4\.conf\.all\.forwarding\s*='
        state: present
        create: yes
        owner: root
        group: root
        mode: '0644'
      notify: Reload sysctl

    - name: Disable X11 forwarding in sshd_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?\s*X11Forwarding\s'
        line: 'X11Forwarding no'
        state: present
        backup: yes
      notify: Restart sshd

    - name: Update dconf database
      ansible.builtin.command:
        cmd: dconf update
      changed_when: false

    - name: Set umask to 077 in /etc/bashrc
      ansible.builtin.lineinfile:
        path: /etc/bashrc
        regexp: '^\s*umask\s+'
        line: 'umask 077'
        state: present
        backup: yes

    - name: Set umask to 077 in /etc/csh.cshrc
      ansible.builtin.lineinfile:
        path: /etc/csh.cshrc
        regexp: '^\s*umask\s+'
        line: 'umask 077'
        state: present
        backup: yes

  handlers:
    - name: Restart postfix
      ansible.builtin.service:
        name: postfix
        state: restarted

    - name: Reload sysctl
      ansible.builtin.command:
        cmd: sysctl --system
      changed_when: false

    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted