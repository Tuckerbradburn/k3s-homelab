# infrastructure/traefik/traefik-config.yaml
# Configures k3s built-in Traefik for:
# - Cloudflare DNS-01 ACME challenge
# - Wildcard cert for *.bradmedia.net
# - HTTPS entrypoint
# - HTTP -> HTTPS redirect
# - ExternalName services allowed for reverse proxying to internal IPs
# - 2 replicas spread across nodes for HA
#
# Prerequisites - create secret before applying:
# kubectl create secret generic cloudflare-api-token \
#   --namespace kube-system \
#   --from-literal=api-token=<your-cloudflare-token>

---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    globalArguments:
      - "--global.sendanonymoususage=false"

    additionalArguments:
      - "--certificatesresolvers.cloudflare.acme.dnschallenge=true"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.email=tuckerbradburn1@gmail.com"
      - "--certificatesresolvers.cloudflare.acme.storage=/data/acme.json"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--providers.kubernetescrd.allowexternalnameservices=true"
      - "--providers.kubernetesingress.allowexternalnameservices=true"

    env:
      - name: CF_DNS_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: api-token

    deployment:
      replicas: 2

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik

    ports:
      web:
        redirectTo:
          port: websecure
      websecure:
        tls:
          enabled: true
          certResolver: cloudflare
          domains:
            - main: "bradmedia.net"
              sans:
                - "*.bradmedia.net"

    persistence:
      enabled: true
      storageClass: local-path
      path: /data
      size: 128Mi