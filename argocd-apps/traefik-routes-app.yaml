apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-routes
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Tuckerbradburn/k3s-homelab-private.git
    targetRevision: HEAD
    path: apps/traefik-routes
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true